name: Weekly Trend Report Update

on:
  schedule:
    # 매주 월요일 오전 9시(한국시간 기준) 자동 실행 (UTC 기준 0시)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Actions 탭에서 수동으로 [Run workflow] 버튼을 누를 수 있게 해줌

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 리포트 파일(index.html 등)을 저장소에 덮어쓰기 위한 권한 설정
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python Script (main.py)
        env:
          # 깃허브 Secrets에 저장된 키들을 파이썬으로 전달
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html raw_data_log.txt
          # 변경된 사항이 있을 때만 커밋하고 푸시 (에러 방지용)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update weekly fashion trend report" && git push)
